<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#343e85"/>
      <stop offset="70%" stop-color="#2a3470"/>
      <stop offset="100%" stop-color="#10653c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative pattern -->
  <circle cx="1050" cy="120" r="200" fill="#fefefe" opacity="0.04"/>
  <circle cx="150" cy="510" r="150" fill="#fefefe" opacity="0.03"/>
  <!-- Logo P -->
  <rect x="80" y="180" width="90" height="90" rx="20" fill="#fefefe" opacity="0.15"/>
  <text x="125" y="248" font-family="Montserrat, system-ui, sans-serif" font-size="52" font-weight="700" fill="#fefefe" text-anchor="middle">P</text>
  <!-- School Name -->
  <text x="195" y="220" font-family="Montserrat, system-ui, sans-serif" font-size="52" font-weight="700" fill="#fefefe">Pardes Day School</text>
  <text x="195" y="260" font-family="Montserrat, system-ui, sans-serif" font-size="22" font-weight="400" fill="#fefefe" opacity="0.8">The Pardes Way. Discover the Difference.</text>
  <!-- Divider -->
  <rect x="80" y="300" width="120" height="3" rx="2" fill="#10653c"/>
  <!-- Description -->
  <text x="80" y="360" font-family="Montserrat, system-ui, sans-serif" font-size="26" fill="#fefefe" opacity="0.9">Jewish Day School in Miami Beach</text>
  <text x="80" y="400" font-family="Montserrat, system-ui, sans-serif" font-size="26" fill="#fefefe" opacity="0.9">Preschool through 8th Grade</text>
  <!-- Bottom info -->
  <text x="80" y="530" font-family="Montserrat, system-ui, sans-serif" font-size="18" fill="#fefefe" opacity="0.5">pardesdayschool.org</text>
  <text x="80" y="560" font-family="Montserrat, system-ui, sans-serif" font-size="16" fill="#fefefe" opacity="0.4">(305) 690-2548  |  Miami Beach, FL</text>
</svg>
