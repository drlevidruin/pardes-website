backend:
  name: github
  repo: drlevidruin/pardes-website
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "data/homepage.json"
        fields:
          - label: "Hero Headline"
            name: "heroHeadline"
            widget: "string"
          - label: "Hero Subtext"
            name: "heroSubtext"
            widget: "string"
          - label: "Proof Bar Stats"
            name: "proofStats"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Origin Story"
            name: "originStory"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph 1", name: "para1", widget: "text" }
              - { label: "Paragraph 2", name: "para2", widget: "text" }

      - name: "contact-info"
        label: "Contact Info"
        file: "data/contact.json"
        fields:
          - label: "Main Campus"
            name: "mainCampus"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string" }
          - label: "MSAP Campus"
            name: "msapCampus"
            widget: "object"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string" }
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "School Hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Division", name: "division", widget: "string" }
              - { label: "Schedule", name: "schedule", widget: "string" }

  - name: "staff"
    label: "Staff Directory"
    files:
      - name: "leadership"
        label: "Leadership Team"
        file: "data/staff-leadership.json"
        fields:
          - label: "Team Members"
            name: "members"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Initials", name: "initials", widget: "string" }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Featured", name: "featured", widget: "boolean", default: true }

  - name: "faq"
    label: "FAQ"
    files:
      - name: "all-faqs"
        label: "All FAQ Items"
        file: "data/faq.json"
        fields:
          - label: "Questions"
            name: "questions"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }
              - { label: "Show on Homepage", name: "showOnHomepage", widget: "boolean", default: false }

  - name: "testimonials"
    label: "Testimonials"
    files:
      - name: "all-testimonials"
        label: "Parent Testimonials"
        file: "data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Detail", name: "detail", widget: "string" }
              - { label: "Initials", name: "initials", widget: "string" }
